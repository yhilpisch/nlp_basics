<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black-Scholes Option Calculator</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --background: #f5f6fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: var(--background);
            color: var(--primary-color);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .input-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        input, select, button {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }

        button {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        .results {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
        }

        .result-item {
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 4px;
        }

        .error {
            color: #e74c3c;
            margin: 10px 0;
        }

        .toggle-group {
            margin: 15px 0;
            display: flex;
            gap: 10px;
        }

        .details {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            .input-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Option Pricing Calculator</h1>
        
        <div class="input-group">
            <div>
                <label>Underlying Price (S₀)</label>
                <input type="number" id="S0" step="0.01" value="36" required>
            </div>
            <div>
                <label>Strike Price (K)</label>
                <input type="number" id="K" step="0.01" value="40" required>
            </div>
            <div>
                <label>Time to Expiration (T)</label>
                <input type="number" id="T" step="0.01" value="1.0" required>
            </div>
            <div>
                <label>Risk-Free Rate (r)</label>
                <input type="number" id="r" step="0.0001" value="0.06" required>
            </div>
            <div>
                <label>Volatility (σ)</label>
                <input type="number" id="sigma" step="0.01" value="0.2" required>
            </div>
            <div>
                <label>Option Type</label>
                <select id="optionType">
                    <option value="call">Call</option>
                    <option value="put">Put</option>
                </select>
            </div>
        </div>

        <div class="toggle-group">
            <button id="calculateBtn">Calculate</button>
            <button id="toggleBtn">Toggle Notation</button>
        </div>

        <div id="error" class="error"></div>
        <div id="results" class="results"></div>

        <div class="details">
            <h3>About the Black-Scholes Model</h3>
            <p>The Black-Scholes model is a mathematical model for pricing options. It assumes:</p>
            <ul>
                <li>Constant volatility and risk-free rate</li>
                <li>No dividends during the option's life</li>
                <li>Lognormal distribution of stock prices</li>
                <li>No arbitrage opportunities</li>
            </ul>
        </div>
    </div>

    <script>
        let scientificNotation = false;
        const calculationCache = {};

        // Normal cumulative distribution function
        const normCDF = x => {
            const a1 = 0.254829592;
            const a2 = -0.284496736;
            const a3 = 1.421413741;
            const a4 = -1.453152027;
            const a5 = 1.061405429;
            const p = 0.3275911;

            const sign = Math.sign(x);
            x = Math.abs(x)/Math.sqrt(2);

            const t = 1.0/(1.0 + p*x);
            const y = 1.0 - ((((a5*t + a4)*t + a3)*t + a2)*t + a1)*t*Math.exp(-x*x);

            return 0.5*(1.0 + sign*y);
        };

        // Black-Scholes calculation
        const calculateBlackScholes = (S, K, T, r, sigma, optionType) => {
            const d1 = (Math.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * Math.sqrt(T));
            const d2 = d1 - sigma * Math.sqrt(T);
            const discountFactor = Math.exp(-r * T);
            
            let price, delta;
            
            if (optionType === 'call') {
                price = S * normCDF(d1) - K * discountFactor * normCDF(d2);
                delta = normCDF(d1);
            } else {
                price = K * discountFactor * normCDF(-d2) - S * normCDF(-d1);
                delta = normCDF(d1) - 1;
            }

            const gamma = (Math.exp(-Math.pow(d1, 2) / 2) / (S * sigma * Math.sqrt(2 * Math.PI * T)));  // manually corrected
            const vega = S * Math.sqrt(T) * Math.exp(-Math.pow(d1, 2) / 2) / Math.sqrt(2 * Math.PI);
            
            const thetaPerYear = optionType === 'call' 
                ? (
                    (-S * sigma * Math.exp(-Math.pow(d1, 2) / 2) / (2 * Math.sqrt(2 * Math.PI * T))  // manually corrected
                    - r * K * discountFactor * normCDF(d2)
                )
                : (
                    (-S * sigma * Math.exp(-Math.pow(d1, 2) / 2) / (2 * Math.sqrt(2 * Math.PI * T))  // manually corrected 
                    + r * K * discountFactor * normCDF(-d2))
                );

            return {
                price,
                delta,
                gamma,
                theta: thetaPerYear,
                vega
            };
        };

        // Format numbers based on current notation
        const formatNumber = num => {
            return scientificNotation 
                ? num.toExponential(4) 
                : num.toFixed(4);
        };

        // Validate user inputs
        const validateInputs = () => {
            const inputs = ['S0', 'K', 'T', 'r', 'sigma'];
            const values = {};
            
            for (const id of inputs) {
                const value = parseFloat(document.getElementById(id).value);
                if (isNaN(value) || value < 0) return null;
                values[id] = value;
            }
            
            if (values.T <= 0) return null;
            return values;
        };

        // Main calculation function
        const calculate = () => {
            const errorElement = document.getElementById('error');
            errorElement.textContent = '';
            
            const values = validateInputs();
            if (!values) {
                errorElement.textContent = 'Please enter valid positive numbers';
                return;
            }

            const { S0: S, K, T, r, sigma } = values;
            const optionType = document.getElementById('optionType').value;
            
            const cacheKey = `${S}_${K}_${T}_${r}_${sigma}_${optionType}`;
            
            if (calculationCache[cacheKey]) {
                showResults(calculationCache[cacheKey]);
                return;
            }

            const results = calculateBlackScholes(S, K, T, r, sigma, optionType);
            calculationCache[cacheKey] = results;
            showResults(results);
        };

        // Display results in UI
        const showResults = results => {
            const resultsHTML = `
                <div class="result-item">Price: ${formatNumber(results.price)}</div>
                <div class="result-item">Delta: ${formatNumber(results.delta)}</div>
                <div class="result-item">Gamma: ${formatNumber(results.gamma)}</div>
                <div class="result-item">Theta: ${formatNumber(results.theta)}</div>
                <div class="result-item">Vega: ${formatNumber(results.vega)}</div>
            `;
            document.getElementById('results').innerHTML = resultsHTML;
        };

        // Toggle number formatting
        const toggleNotation = () => {
            scientificNotation = !scientificNotation;
            const currentResults = document.getElementById('results').innerHTML;
            document.getElementById('results').innerHTML = currentResults;
        };

        // Initialize event listeners
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('calculateBtn').addEventListener('click', calculate);
            document.getElementById('toggleBtn').addEventListener('click', toggleNotation);
        });
    </script>
</body>
</html>
